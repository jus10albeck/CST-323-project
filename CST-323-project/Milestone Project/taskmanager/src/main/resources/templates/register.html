<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
    layout:decorate="layouts/defaultTemplate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            background-color: #808080;
        }

        .register-container {
            width: 400px;
            margin: 50px auto;
            padding: 40px;            
            text-align: center;
        }

        .form-control {
            width: 70%;
            margin: 0 auto 7px auto;
            text-align: center;
        }

        .label-text {
            color:gold;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: large;
        }

        .btn-submit {
            width: 120px;
            height: 40px;
            font-size: 14px;
            margin: 15px auto;
            display: block;
        }

        .error-text {
            color: rgb(161, 25, 25);
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
    <body>
        <section layout:fragment="content">
            <div class="register-container">
                
                <!-- Registration Form -->
                <form th:action="@{/register/doRegister}" th:object="${registrationModel}" method="post">

                    <!-- First Name -->
                    <input type="text"  th:field="*{firstName}" class="form-control">
                    <div class="label-text">First Name</div>
                    
                    <!-- Validation Error for First Name -->
                    <div class="error-text"
                        th:if="${#fields.hasErrors('firstName')}" 
                        th:errors="*{firstName}">
                    </div>

                    <!-- Last Name -->
                    <input type="text" th:field="*{lastName}" class="form-control"/>
                    <div class="label-text">Last Name</div>
                    
                    <!-- Validation Error for Last Name -->
                    <div class="error-text"
                        th:if="${#fields.hasErrors('lastName')}" 
                        th:errors="*{lastName}">
                    </div>

                    <!-- Email -->
                    <input type="email" th:field="*{email}" class="form-control"/>
                    <div class="label-text">Email</div>
                    
                    <!-- Validation Error for Email -->
                    <div class="error-text"
                        th:if="${#fields.hasErrors('email')}" 
                        th:errors="*{email}">
                    </div>

                    <!-- Phone Number -->
                    <input type="text" th:field="*{phoneNumber}" class="form-control"/>
                    <div class="label-text">Phone Number</div>

                    <!-- Validation Error for Phone Number -->
                    <div class="error-text"
                        th:if="${#fields.hasErrors('phoneNumber')}" 
                        th:errors="*{phoneNumber}">
                    </div>

                    <!-- Username -->
                    <input type="text" th:field="*{username}" class="form-control"/>
                    <div class="label-text">Username</div>

                    <!-- Validation Error for Username -->
                    <div class="error-text"
                        th:if="${#fields.hasErrors('username')}" 
                        th:errors="*{username}">
                    </div>

                    <!-- Password -->
                     <input type="password" th:field="*{password}" class="form-control"/>
                    <div class="label-text">Password</div>

                    <!-- Validation Error for Password -->
                    <div class="error-text"
                        th:if="${#fields.hasErrors('password')}" 
                        th:errors="*{password}">
                    </div>

                    <button type="submit" class="btn btn-default btn-submit">Submit</button>
                </form>
            </div>
        </section>        
    </body>
